name: Update Leaderboard

on:
  pull_request_target:
    types: [opened, synchronize]
  workflow_dispatch: 

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. First, we checkout YOUR main branch (where the script and leaderboard are)
      - name: Checkout Main Repository
        uses: actions/checkout@v3
        with:
          ref: main

      # 2. Next, we SPECIFICALLY download the student's submission.csv file
      # This replaces YOUR submission.csv with THEIRS just for this run.
      - name: Fetch Student Submission
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: student_files

      - name: Prepare Student File
        run: |
          if [ -f "student_files/submission.csv" ]; then
            cp student_files/submission.csv ./submission.csv
            echo "✅ Student submission.csv loaded."
          else
            echo "❌ Error: submission.csv not found in student PR."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas scikit-learn

      - name: Run Evaluation
        env:
          FLOWER_ANSWERS: ${{ secrets.FLOWER_ANSWERS }} 
        run: python evaluate.py ${{ github.event.pull_request.user.login }}

      - name: Commit and Push Leaderboard Update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Leaderboard Bot"
          git add scores.json README.md
          # We push specifically to the main branch
          git commit -m "🏆 Update leaderboard for ${{ github.event.pull_request.user.login }}" || echo "No changes to commit"
          git push origin main
